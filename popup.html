<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 15px;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }
    .status {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>🔙 ESC Navigation</h1>
  <div class="toggle-container">
    <span>Включить ESC</span>
    <input type="checkbox" id="toggle" checked>
  </div>
  <div class="status">
    <div>Статус: <strong id="statusText">Активно</strong></div>
    <div style="margin-top: 8px;">Горячая клавиша: <kbd>ESC</kbd></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
